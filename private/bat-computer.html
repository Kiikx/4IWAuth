<!DOCTYPE html>
<html lang="fr-FR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Batcave - Ordinateur</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="/register.html">Accueil</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/register.html">S'inscrire</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="/bat-computer.html">Batcave</a>
            </li>
          </ul>
        </div>
        <a class="nav-link" href="/auth/logout">Se déconnecter</a>
      </div>
    </nav>
    <main class="container mt-5">
      <div class="row">
        <div class="col-md-8 offset-md-2">
          <h1 id="welcome-message">Bienvenue...</h1>
          <div class="card mt-4">
            <div class="card-body">
              <h5 class="card-title">Centre de Dossiers</h5>
              <p class="card-text">Enregistrez une note de mission</p>
              <form id="report-form">
                <div class="mb-3">
                  <label for="mission-note" class="form-label">Note de mission</label>
                  <textarea
                    class="form-control"
                    id="mission-note"
                    rows="4"
                    placeholder="Décrivez votre mission..."
                    required
                  ></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
              </form>
              <div id="message" class="mt-3"></div>
            </div>
          </div>
          <div class="card mt-4">
            <div class="card-body">
              <h2 class="h5 card-title">Modifier le mot de passe</h2>
              <form id="password-form">
                <div class="mb-3">
                  <label for="old-password" class="form-label">Ancien mot de passe</label>
                  <input id="old-password" type="password" class="form-control" required />
                </div>
                <div class="mb-3">
                  <label for="new-password" class="form-label">Nouveau mot de passe</label>
                  <input id="new-password" type="password" class="form-control" required />
                </div>
                <button type="submit" class="btn btn-warning">Mettre à jour</button>
              </form>
              <div id="password-message" class="mt-3"></div>
            </div>
          </div>
          <section class="mt-4">
            <h2 class="h4">Arsenal</h2>
            <div id="arsenal-message" class="alert alert-info">Chargement de l'arsenal...</div>
            <div id="arsenal-grid" class="row g-3"></div>
          </section>
        </div>
      </div>
    </main>
    <script src="/dashboard.js"></script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
