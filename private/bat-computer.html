<!DOCTYPE html>
<html lang="fr-FR">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Batcave - Ordinateur</title>
    <link
      href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css"
      rel="stylesheet"
      integrity="sha384-sRIl4kxILFvY47J16cr9ZwB07vP4J8+LH7qKQnuqkuIAvNWLzeN8tE5YBujZqJLB"
      crossorigin="anonymous"
    />
  </head>
  <body>
    <nav class="navbar navbar-expand-lg bg-body-tertiary">
      <div class="container-fluid">
        <button
          class="navbar-toggler"
          type="button"
          data-bs-toggle="collapse"
          data-bs-target="#navbarNav"
          aria-controls="navbarNav"
          aria-expanded="false"
          aria-label="Toggle navigation"
        >
          <span class="navbar-toggler-icon"></span>
        </button>
        <div class="collapse navbar-collapse" id="navbarNav">
          <ul class="navbar-nav">
            <li class="nav-item">
              <a class="nav-link" href="/register.html">Accueil</a>
            </li>
            <li class="nav-item">
              <a class="nav-link" href="/register.html">S'inscrire</a>
            </li>
            <li class="nav-item">
              <a class="nav-link active" href="/bat-computer.html">Batcave</a>
            </li>
          </ul>
        </div>
      </div>
    </nav>
    <main class="container mt-5">
      <div class="row">
        <div class="col-md-8 offset-md-2">
          <h1 id="welcome-message">Bienvenue...</h1>
          <div class="card mt-4">
            <div class="card-body">
              <h5 class="card-title">Centre de Dossiers</h5>
              <p class="card-text">Enregistrez une note de mission</p>
              <form id="report-form">
                <div class="mb-3">
                  <label for="mission-note" class="form-label">Note de mission</label>
                  <textarea
                    class="form-control"
                    id="mission-note"
                    rows="4"
                    placeholder="Décrivez votre mission..."
                    required
                  ></textarea>
                </div>
                <button type="submit" class="btn btn-primary">Enregistrer</button>
              </form>
              <div id="message" class="mt-3"></div>
            </div>
          </div>
          <section class="mt-4">
            <h2 class="h4">Arsenal</h2>
            <div id="arsenal-message" class="alert alert-info">Chargement de l'arsenal...</div>
            <div id="arsenal-grid" class="row g-3"></div>
          </section>
        </div>
      </div>
    </main>
    <script>
      fetch('/api/me')
        .then(response => response.json())
        .then(data => {
          document.getElementById('welcome-message').textContent = `Bienvenue, Justicier ${data.username}`
        })
        .catch(error => {
          console.error('Erreur:', error)
          document.getElementById('welcome-message').textContent = 'Erreur lors du chargement'
        })

      document.getElementById('report-form').addEventListener('submit', async (e) => {
        e.preventDefault()
        const missionNote = document.getElementById('mission-note').value

        try {
          const response = await fetch('/api/reports', {
            method: 'POST',
            headers: {
              'Content-Type': 'application/json'
            },
            body: JSON.stringify({ mission_note: missionNote })
          })

          const messageDiv = document.getElementById('message')
          if (response.ok) {
            messageDiv.innerHTML = '<div class="alert alert-success">Rapport enregistré avec succès !</div>'
            document.getElementById('mission-note').value = ''
          } else {
            messageDiv.innerHTML = '<div class="alert alert-danger">Erreur lors de l\'enregistrement.</div>'
          }
        } catch (error) {
          console.error('Erreur:', error)
          document.getElementById('message').innerHTML = '<div class="alert alert-danger">Erreur réseau</div>'
        }
      })

      const createSecretCard = secret => {
        const column = document.createElement("div")
        column.className = "col-sm-6 col-lg-3"
        column.innerHTML = `<article class="card h-100"><div class="card-body"><span class="badge text-bg-dark mb-3"></span><h3 class="h5 card-title"></h3><p class="card-text"></p></div></article>`
        column.querySelector("span").textContent = secret.icon
        column.querySelector("h3").textContent = secret.name
        column.querySelector("p").textContent = secret.desc
        return column
      }

      const loadSecrets = async () => {
        const messageDiv = document.getElementById("arsenal-message")
        const grid = document.getElementById("arsenal-grid")
        let authorization = sessionStorage.getItem("basicAuthHeader")

        if (!authorization) {
          const username = window.prompt("Utilisateur Basic Auth")
          const password = window.prompt("Mot de passe Basic Auth")

          if (!username || !password) {
            messageDiv.className = "alert alert-warning"
            messageDiv.textContent = "Arsenal non chargé."
            return
          }

          authorization = "Basic " + btoa(username + ":" + password)
          sessionStorage.setItem("basicAuthHeader", authorization)
        }

        try {
          const response = await fetch("/api/secrets", {
            headers: { Authorization: authorization }
          })

          if (!response.ok) {
            sessionStorage.removeItem("basicAuthHeader")
            messageDiv.className = "alert alert-danger"
            messageDiv.textContent = "Impossible de charger l'arsenal."
            return
          }

          const secrets = await response.json()
          grid.innerHTML = ""
          secrets.forEach(secret => {
            grid.appendChild(createSecretCard(secret))
          })
          messageDiv.remove()
        } catch (error) {
          console.error("Erreur:", error)
          messageDiv.className = "alert alert-danger"
          messageDiv.textContent = "Erreur réseau"
        }
      }

      loadSecrets()
    </script>
    <script
      src="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"
      integrity="sha384-FKyoEForCGlyvwx9Hj09JcYn3nv7wiPVlz7YYwJrWVcXK/BmnVDxM+D2scQbITxI"
      crossorigin="anonymous"
    ></script>
  </body>
</html>
